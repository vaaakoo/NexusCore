name: Nexus.Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        source-url: https://nuget.pkg.github.com/vaaakoo/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Restore dependencies
      run: dotnet restore Nexus.Core.slnx

    - name: Build
      run: dotnet build Nexus.Core.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test Nexus.Core.slnx --configuration Release --no-build --verbosity normal

  publish:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        source-url: https://nuget.pkg.github.com/vaoakoo/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Pack
      run: dotnet pack src/Nexus.Core.Infrastructure/Nexus.Core.Infrastructure.csproj --configuration Release --output nupkg

    - name: Publish to GitHub Packages
      run: dotnet nuget push nupkg/*.nupkg --source "https://nuget.pkg.github.com/vaaakoo/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
