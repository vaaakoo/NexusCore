name: Nexus.Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Nexus.Core.slnx

    - name: Build
      run: dotnet build Nexus.Core.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test Nexus.Core.slnx --configuration Release --no-build --verbosity normal
